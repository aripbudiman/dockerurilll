services:
  postgresql:
    image: postgres:16-alpine
    container_name: postgresql
    restart: always
    environment:
      POSTGRES_USER: urilll
      POSTGRES_PASSWORD: samporejois22
      POSTGRES_DB: mydb
    ports:
      - 5432:5432
    volumes:
      - ./postgresql_data:/var/lib/postgresql/data
    networks:
      postgresql_net:
        ipv4_address: 172.21.0.2

networks:
  postgresql_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
