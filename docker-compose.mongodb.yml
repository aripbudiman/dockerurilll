# https://hub.docker.com/_/mongo
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always

    ports:
      - '127.0.0.1:27017:27017/tcp'

    environment:
      MONGO_INITDB_ROOT_USERNAME: urilll
      MONGO_INITDB_ROOT_PASSWORD: "Samporejois22;"
      MONGO_INITDB_DATABASE: mydb

    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb

    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'

  # Optional: MongoDB Express (Web UI)
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: always
    depends_on:
      - mongodb

    ports:
      - '127.0.0.1:8081:8081/tcp'

    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: urilll
      ME_CONFIG_MONGODB_ADMINPASSWORD: "Samporejois22;"
      ME_CONFIG_MONGODB_URL: "mongodb://urilll:Samporejois22;@mongodb:27017/"
      ME_CONFIG_BASICAUTH: false

    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'

volumes:
  mongodb_data: {}
  mongodb_config: {}
