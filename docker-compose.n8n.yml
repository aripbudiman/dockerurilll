version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=n8n.printhub.my.id/
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=n8n.printhub.my.id/

volumes:
  n8n_data: